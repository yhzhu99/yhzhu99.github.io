<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Workspace · Yinghao Zhu (朱英豪)</title>
<meta name="description" content="An interactive 3D reconstruction of Yinghao Zhu's graduate workstation.">
<link rel="icon" type="image/jpeg" href="https://www.hku.hk/f/page/7561/150p169/1d@750.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script src="data/profile.js"></script>
<script src="data/links.js"></script>
<script src="data/publications.js"></script>
<script src="data/education.js"></script>
<script src="data/experience.js"></script>
<script src="data/awards.js"></script>

<style>
    :root {
        --primary-blue: #005bac;
        --ink: #0f172a;
        --ink-soft: #475569;
        --ink-faint: #94a3b8;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
        width: 100%; height: 100%; overflow: hidden;
        background: #edf5f0;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
        letter-spacing: 0;
    }
    #scene { display: block; width: 100vw; height: 100vh; cursor: grab; }
    #scene:active { cursor: grabbing; }
    #scene.pointer { cursor: pointer; }

    /* ---------- Loader ---------- */
    #loader {
        position: fixed; inset: 0; z-index: 100;
        background: radial-gradient(circle at 50% 38%, #ffffff 0%, #edf5f0 72%);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 22px; color: var(--ink);
        transition: opacity 0.8s ease 0.2s;
    }
    #loader.hide { opacity: 0; pointer-events: none; }
    .loader-cube {
        width: 54px; height: 54px;
        transform-style: preserve-3d;
        animation: spin 2.4s linear infinite;
        position: relative;
    }
    .loader-cube span {
        position: absolute; inset: 0; border: 1.5px solid rgba(0,91,172,0.45);
        background: rgba(255,255,255,0.55);
    }
    .loader-cube span:nth-child(1) { transform: rotateY(0deg) translateZ(27px); }
    .loader-cube span:nth-child(2) { transform: rotateY(90deg) translateZ(27px); }
    .loader-cube span:nth-child(3) { transform: rotateY(180deg) translateZ(27px); }
    .loader-cube span:nth-child(4) { transform: rotateY(-90deg) translateZ(27px); }
    .loader-cube span:nth-child(5) { transform: rotateX(90deg) translateZ(27px); }
    .loader-cube span:nth-child(6) { transform: rotateX(-90deg) translateZ(27px); }
    @keyframes spin { from { transform: rotateX(0) rotateY(0); } to { transform: rotateX(360deg) rotateY(360deg); } }
    #loader p { font-size: 13px; color: var(--ink-faint); font-family: 'JetBrains Mono', monospace; letter-spacing: 0; }

    /* ---------- Top bar ---------- */
    #topbar {
        position: fixed; top: 0; left: 0; right: 0; z-index: 40;
        display: flex; align-items: center; justify-content: space-between;
        padding: 16px 22px;
        background: linear-gradient(to bottom, rgba(255,255,255,0.82), rgba(255,255,255,0));
        pointer-events: none;
    }
    #topbar > * { pointer-events: auto; }
    .brand { display: flex; align-items: center; gap: 10px; color: var(--ink); }
    .brand .dot { width: 6px; height: 22px; border-radius: 3px; background: var(--primary-blue); box-shadow: 0 0 14px rgba(0,91,172,0.28); }
    .brand h1 { font-size: 16px; font-weight: 700; }
    .brand .sub { font-size: 12px; color: var(--ink-faint); font-family: 'JetBrains Mono', monospace; }
    #back-btn {
        display: inline-flex; align-items: center; gap: 8px;
        padding: 9px 15px; border-radius: 999px;
        background: rgba(255,255,255,0.76); color: var(--ink);
        border: 1px solid rgba(15,23,42,0.12);
        font-size: 13px; font-weight: 500; cursor: pointer;
        backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        transition: all 0.2s ease;
        text-decoration: none;
    }
    #back-btn:hover { background: var(--primary-blue); border-color: var(--primary-blue); color: #fff; transform: translateX(-2px); }
    #back-btn svg { width: 15px; height: 15px; }

    /* ---------- Hint bar ---------- */
    #hint {
        position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
        z-index: 40; pointer-events: none;
        display: flex; align-items: center; gap: 18px;
        padding: 9px 18px; border-radius: 999px;
        background: rgba(255,255,255,0.82);
        border: 1px solid rgba(15,23,42,0.1);
        backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        color: var(--ink-soft); font-size: 12px;
        font-family: 'JetBrains Mono', monospace;
        white-space: nowrap;
    }
    #hint b { color: var(--ink); font-weight: 600; margin-right: 4px; }
    #hint .sep { width: 1px; height: 12px; background: rgba(15,23,42,0.16); }

    /* ---------- Hotspot pings (markers over interactive objects) ---------- */
    #hotspots { position: fixed; inset: 0; z-index: 30; pointer-events: none; overflow: hidden; }
    .ping {
        position: absolute; width: 22px; height: 22px; margin: -11px 0 0 -11px;
        transform: translate3d(-9999px,-9999px,0);
    }
    .ping::before, .ping::after {
        content: ''; position: absolute; inset: 0; border-radius: 50%;
        border: 2px solid #005bac;
    }
    .ping::before { animation: ping 2.4s ease-out infinite; }
    .ping::after { background: #005bac; transform: scale(0.42); box-shadow: 0 0 14px rgba(0,91,172,0.55); opacity: 0.95; }
    @keyframes ping {
        0% { transform: scale(0.5); opacity: 0.9; }
        100% { transform: scale(2.6); opacity: 0; }
    }
    .ping .label {
        position: absolute; left: 22px; top: 50%; transform: translateY(-50%);
        white-space: nowrap; font-size: 11px; font-weight: 700; color: var(--ink);
        background: rgba(255,255,255,0.9); border: 1px solid rgba(0,91,172,0.28);
        padding: 3px 8px; border-radius: 6px;
        font-family: 'JetBrains Mono', monospace; letter-spacing: 0;
        backdrop-filter: blur(6px);
    }

    /* ---------- Detail panel ---------- */
    #panel-overlay {
        position: fixed; inset: 0; z-index: 60;
        background: rgba(15,23,42,0.28);
        backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
        display: flex; align-items: center; justify-content: center; padding: 24px;
        opacity: 0; pointer-events: none;
        transition: opacity 0.28s ease;
    }
    #panel-overlay.open { opacity: 1; pointer-events: auto; }
    #panel {
        width: 100%; max-width: 760px; max-height: 86vh;
        background: #ffffff; border-radius: 18px; overflow: hidden;
        display: flex; flex-direction: column;
        box-shadow: 0 30px 80px -20px rgba(0,0,0,0.6);
        transform: translateY(14px) scale(0.97); opacity: 0;
        transition: transform 0.32s cubic-bezier(.2,.8,.2,1), opacity 0.32s ease;
    }
    #panel-overlay.open #panel { transform: none; opacity: 1; }
    .panel-head {
        display: flex; align-items: center; justify-content: space-between;
        padding: 18px 22px 14px;
        border-bottom: 1px solid #e2e8f0;
    }
    .panel-head .titles { display: flex; align-items: center; gap: 11px; }
    .panel-head .ic {
        width: 34px; height: 34px; border-radius: 9px; flex-shrink: 0;
        display: flex; align-items: center; justify-content: center;
        background: rgba(0,91,172,0.1); color: var(--primary-blue);
    }
    .panel-head .ic svg { width: 18px; height: 18px; }
    .panel-head h2 { font-size: 17px; font-weight: 700; color: var(--ink); }
    .panel-head .kicker { font-size: 11px; color: var(--ink-faint); font-family: 'JetBrains Mono', monospace; letter-spacing: 0; text-transform: uppercase; }
    .close-btn {
        width: 32px; height: 32px; border-radius: 9px; border: none;
        background: #f1f5f9; color: var(--ink-soft); cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        transition: all 0.18s ease;
    }
    .close-btn:hover { background: #e2e8f0; color: var(--ink); transform: rotate(90deg); }
    .close-btn svg { width: 16px; height: 16px; }
    .panel-body { padding: 20px 22px; overflow-y: auto; }
    .panel-body::-webkit-scrollbar { width: 8px; }
    .panel-body::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

    .about-grid { display: grid; grid-template-columns: 130px 1fr; gap: 20px; align-items: start; }
    .about-grid img { width: 130px; height: 130px; border-radius: 14px; object-fit: cover; box-shadow: 0 0 0 1px rgba(15,23,42,0.08), 0 6px 18px -6px rgba(15,23,42,0.25); }
    .about-name { font-size: 22px; font-weight: 800; color: var(--ink); }
    .about-cn { color: var(--ink-soft); font-size: 15px; margin-bottom: 6px; }
    .about-role { color: var(--primary-blue); font-weight: 600; font-size: 13px; }
    .about-aff { color: var(--ink-soft); font-size: 13px; }
    .about-bio { grid-column: 1 / -1; color: var(--ink); font-size: 14px; line-height: 1.7; margin-top: 4px; }
    .about-bio a { color: var(--primary-blue); text-decoration: none; }
    .about-bio a:hover { text-decoration: underline; }
    .about-bio strong { color: var(--primary-blue); font-weight: 600; }
    .interest-grid { grid-column: 1 / -1; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
    .interest { border-left: 2px solid var(--primary-blue); padding: 8px 12px; background: #f8fafc; border-radius: 0 8px 8px 0; }
    .interest h5 { font-size: 13px; font-weight: 600; color: var(--ink); }
    .interest p { font-size: 12px; color: var(--ink-soft); margin-top: 2px; line-height: 1.5; }

    .pub { padding: 13px 0; border-bottom: 1px solid #eef2f7; }
    .pub:last-child { border-bottom: none; }
    .pub h4 { font-size: 14px; font-weight: 600; color: var(--ink); line-height: 1.4; }
    .pub .authors { font-size: 12px; color: var(--ink-soft); margin-top: 3px; line-height: 1.5; }
    .pub .authors .me { font-weight: 700; color: var(--primary-blue); }
    .pub .venue { font-size: 12px; color: var(--primary-blue); font-style: italic; margin-top: 3px; }
    .pub .links { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 7px; }
    .pub .links a {
        font-size: 11px; padding: 3px 9px; border-radius: 999px;
        background: #f1f5f9; color: var(--ink-soft); text-decoration: none;
        border: 1px solid rgba(15,23,42,0.05);
        transition: all 0.18s ease;
    }
    .pub .links a:hover { background: var(--primary-blue); color: #fff; border-color: var(--primary-blue); }

    .timeline { position: relative; padding-left: 22px; }
    .timeline::before { content: ''; position: absolute; left: 6px; top: 4px; bottom: 4px; width: 2px; background: linear-gradient(to bottom, var(--primary-blue), rgba(0,91,172,0.15)); }
    .tl-item { position: relative; padding: 0 0 16px 6px; }
    .tl-item::before { content: ''; position: absolute; left: -22px; top: 4px; width: 12px; height: 12px; border-radius: 50%; background: var(--primary-blue); box-shadow: 0 0 0 3px #fff, 0 0 0 5px var(--primary-blue); }
    .tl-item .tl-when { font-size: 11px; color: var(--ink-faint); font-family: 'JetBrains Mono', monospace; }
    .tl-item h4 { font-size: 14px; font-weight: 600; color: var(--ink); margin-top: 1px; }
    .tl-item .tl-sub { font-size: 12.5px; color: var(--primary-blue); font-weight: 500; }
    .tl-item .tl-meta { font-size: 12px; color: var(--ink-soft); }
    .tl-item .tl-det { font-size: 12px; color: var(--ink-soft); margin-top: 2px; }
    .tl-item .tl-det a { color: var(--primary-blue); text-decoration: none; }

    .award { display: flex; align-items: flex-start; gap: 12px; padding: 11px 0; border-bottom: 1px solid #eef2f7; }
    .award:last-child { border-bottom: none; }
    .award .yr { font-size: 11px; color: var(--ink-faint); font-family: 'JetBrains Mono', monospace; flex-shrink: 0; width: 46px; padding-top: 1px; }
    .award .body h4 { font-size: 13.5px; font-weight: 600; color: var(--ink); }
    .award .body p { font-size: 12px; color: var(--ink-soft); margin-top: 1px; }

    .links-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .lk {
        display: flex; align-items: center; gap: 10px;
        padding: 11px 13px; border-radius: 11px;
        background: #f8fafc; border: 1px solid #eef2f7;
        text-decoration: none; color: var(--ink);
        transition: all 0.18s ease;
    }
    .lk:hover { background: var(--primary-blue); color: #fff; border-color: var(--primary-blue); transform: translateY(-1px); }
    .lk svg { width: 17px; height: 17px; flex-shrink: 0; }
    .lk .nm { font-size: 13px; font-weight: 500; }
    .contact-row { margin-top: 16px; padding: 14px 16px; background: #f8fafc; border-radius: 12px; display: flex; align-items: center; gap: 10px; }
    .contact-row svg { width: 16px; height: 16px; color: var(--primary-blue); }
    .contact-row a { color: var(--ink); text-decoration: none; font-size: 14px; font-family: 'JetBrains Mono', monospace; }

    @media (max-width: 640px) {
        .about-grid { grid-template-columns: 1fr; }
        .about-grid img { width: 96px; height: 96px; }
        .interest-grid { grid-template-columns: 1fr; }
        .links-grid { grid-template-columns: 1fr; }
        #hint { font-size: 10px; gap: 10px; padding: 7px 12px; }
    }
</style>
</head>
<body>

<canvas id="scene"></canvas>

<div id="loader">
    <div class="loader-cube"><span></span><span></span><span></span><span></span><span></span><span></span></div>
    <p>Opening the Beihang workstation...</p>
</div>

<div id="topbar">
    <div class="brand">
        <div class="dot"></div>
        <div>
            <h1>Yinghao Zhu <span style="color:var(--ink-faint);font-weight:400;">朱英豪</span></h1>
            <div class="sub">3D Workspace · 北航工位</div>
        </div>
    </div>
    <a id="back-btn" href="index.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Back to homepage
    </a>
</div>

<div id="hotspots"></div>

<div id="hint">
    <span><b>360°</b>Beihang workstation</span>
    <span class="sep"></span>
    <span><b>Bright</b>desk scene</span>
</div>

<div id="panel-overlay">
    <div id="panel">
        <div class="panel-head">
            <div class="titles">
                <div class="ic" id="panel-ic"></div>
                <div>
                    <div class="kicker" id="panel-kicker">Detail</div>
                    <h2 id="panel-title">Title</h2>
                </div>
            </div>
            <button class="close-btn" id="panel-close" aria-label="Close">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="panel-body" id="panel-body"></div>
    </div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* ============================ DATA ============================ */
const SITE_DATA = window.SiteData || {};
const PROFILE = SITE_DATA.profile || {};
const DATA = {
    name: PROFILE.name || 'Yinghao Zhu',
    cnName: PROFILE.cnName || '朱英豪',
    title: PROFILE.title || 'PhD Student',
    affiliation: PROFILE.affiliation || 'The University of Hong Kong',
    school: PROFILE.school || 'School of Computing and Data Science',
    email: PROFILE.email || 'yhzhu99@gmail.com',
    photo: PROFILE.photo || 'https://s1.imagehub.cc/images/2023/12/09/4b39a6bfda62b617772d6082ee8b21c8.th.png',
    bio: PROFILE.bio || '',
    interests: PROFILE.interests || [],
    workspace: PROFILE.workspace || {},
    featuredPublications: (SITE_DATA.publications || []).filter(pub => pub.featured),
    education: SITE_DATA.education || [],
    experience: SITE_DATA.experience || [],
    awards: SITE_DATA.awards || [],
    links: SITE_DATA.quickLinks || []
};
const LINK_ICONS = SITE_DATA.quickLinkIcons || {};

/* ============================ SCENE SETUP ============================ */
const canvas = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xeaf4ef);
scene.fog = new THREE.Fog(0xeaf4ef, 12, 24);

const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 100);
const CAM_START = new THREE.Vector3(4.6, 2.5, 4.8);
const CAM_REST = new THREE.Vector3(3.1, 1.78, 3.05);
camera.position.copy(CAM_START);

const controls = new OrbitControls(camera, canvas);
controls.target.set(0, 1.1, -0.75);
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.enablePan = false;
controls.minDistance = 1.9;
controls.maxDistance = 7.4;
controls.minPolarAngle = 0.35;
controls.maxPolarAngle = Math.PI / 2 - 0.04;
controls.rotateSpeed = 0.65;
controls.zoomSpeed = 0.7;

/* ============================ LIGHTING ============================ */
scene.add(new THREE.HemisphereLight(0xffffff, 0xd8c7aa, 1.2));

const sun = new THREE.DirectionalLight(0xfff7df, 1.45);
sun.position.set(-3.5, 6.5, 4);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -5;
sun.shadow.camera.right = 5;
sun.shadow.camera.top = 5;
sun.shadow.camera.bottom = -5;
sun.shadow.camera.near = 0.5;
sun.shadow.camera.far = 18;
sun.shadow.bias = -0.0004;
sun.shadow.normalBias = 0.02;
scene.add(sun);

const deskLamp = new THREE.PointLight(0xffdfa8, 0.65, 6, 1.6);
deskLamp.position.set(1.25, 1.55, -0.55);
deskLamp.castShadow = true;
deskLamp.shadow.mapSize.set(512, 512);
scene.add(deskLamp);

const screenGlow = new THREE.PointLight(0x8fc7ff, 0.45, 3.5, 2);
screenGlow.position.set(0, 1.3, -0.35);
scene.add(screenGlow);

const ceilingGlow = new THREE.PointLight(0xffffff, 1.2, 7.5, 1.3);
ceilingGlow.position.set(0, 2.85, -0.55);
scene.add(ceilingGlow);

/* ============================ MATERIAL HELPERS ============================ */
const std = (color, opts = {}) => new THREE.MeshStandardMaterial({ color: new THREE.Color(color), roughness: 0.85, metalness: 0.0, ...opts });
const box = (w, h, d, mat, x = 0, y = 0, z = 0) => {
    const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
    m.position.set(x, y, z);
    return m;
};
const addBox = (w, h, d, mat, x = 0, y = 0, z = 0, parent = scene) => {
    const m = box(w, h, d, mat, x, y, z);
    parent.add(m);
    return m;
};
const setShadow = (obj, cast = true, receive = false) => {
    obj.traverse(o => {
        if (o.isMesh) {
            o.castShadow = cast;
            o.receiveShadow = receive;
        }
    });
    return obj;
};
const cylinderBetween = (from, to, radius, mat, parent = scene, segments = 16) => {
    const start = new THREE.Vector3(...from);
    const end = new THREE.Vector3(...to);
    const mid = start.clone().add(end).multiplyScalar(0.5);
    const dir = end.clone().sub(start);
    const mesh = new THREE.Mesh(new THREE.CylinderGeometry(radius, radius, dir.length(), segments), mat);
    mesh.position.copy(mid);
    mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.normalize());
    parent.add(mesh);
    return mesh;
};
/* ============================ ROOM ============================ */
const ROOM = new THREE.Group();
scene.add(ROOM);

const floorMat = std(0xd8c8aa, { roughness: 0.64 });
const floor = new THREE.Mesh(new THREE.PlaneGeometry(12, 10), floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
ROOM.add(floor);

const wallColor = 0xf2eadb;
const wallMat = std(wallColor, { roughness: 0.98 });
const backWall = addBox(7.6, 3.1, 0.14, wallMat, 0, 1.55, -3.1, ROOM);
backWall.receiveShadow = true;
const leftReturn = addBox(0.12, 2.8, 2.0, std(0xe6dfcf, { roughness: 0.98 }), -3.55, 1.4, 2.1, ROOM);
const rightReturn = addBox(0.12, 2.8, 2.0, std(0xe6dfcf, { roughness: 0.98 }), 3.55, 1.4, 2.1, ROOM);
leftReturn.receiveShadow = true;
rightReturn.receiveShadow = true;

const ceiling = addBox(7.6, 0.08, 6.6, std(0xf8f5ec, { roughness: 0.95 }), 0, 3.08, -0.15, ROOM);
ceiling.receiveShadow = true;
const lightBarMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 1.15, roughness: 0.35 });
addBox(1.9, 0.035, 0.16, lightBarMat, 0, 3.035, -1.85, ROOM);
addBox(1.5, 0.035, 0.16, lightBarMat, -1.8, 3.035, 1.3, ROOM);
addBox(1.5, 0.035, 0.16, lightBarMat, 1.8, 3.035, 1.3, ROOM);

const skirtingMat = std(0xeae4d6);
addBox(7.8, 0.12, 0.05, skirtingMat, 0, 0.06, -3.0, ROOM);

function createRubiksCube() {
    const cubeGroup = new THREE.Group();
    const black = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.58 });
    const colors = {
        right: new THREE.MeshStandardMaterial({ color: 0xd62828, roughness: 0.5 }),
        left: new THREE.MeshStandardMaterial({ color: 0xf77f00, roughness: 0.5 }),
        top: new THREE.MeshStandardMaterial({ color: 0xf8f9fa, roughness: 0.45 }),
        bottom: new THREE.MeshStandardMaterial({ color: 0xffd60a, roughness: 0.5 }),
        front: new THREE.MeshStandardMaterial({ color: 0x1d4ed8, roughness: 0.5 }),
        back: new THREE.MeshStandardMaterial({ color: 0x15803d, roughness: 0.5 })
    };
    const size = 0.048;
    const gap = 0.004;
    for (let x = -1; x <= 1; x++) {
        for (let y = -1; y <= 1; y++) {
            for (let z = -1; z <= 1; z++) {
                const materials = [
                    x === 1 ? colors.right : black,
                    x === -1 ? colors.left : black,
                    y === 1 ? colors.top : black,
                    y === -1 ? colors.bottom : black,
                    z === 1 ? colors.front : black,
                    z === -1 ? colors.back : black
                ];
                const cubie = new THREE.Mesh(new THREE.BoxGeometry(size, size, size), materials);
                cubie.position.set(x * (size + gap), y * (size + gap), z * (size + gap));
                cubie.castShadow = true;
                cubeGroup.add(cubie);
            }
        }
    }
    cubeGroup.position.set(-1.12, 0.9, 0.45);
    cubeGroup.rotation.set(0.12, -0.48, 0.08);
    return cubeGroup;
}

        ctx.fillStyle = '#2f4052';
        ctx.fillText(row, 132, y);
        ctx.fillStyle = '#9a7d4f';
        ctx.fillRect(78, y + 24, 340 - i * 26, 10);
        if (i < rows.length - 1) {
            ctx.strokeStyle = '#d8c6a3';
            ctx.lineWidth = 8;
            ctx.beginPath();
            ctx.moveTo(94, y + 20);
            ctx.lineTo(94, y + 98);
            ctx.stroke();
        }
    });
    const tex = new THREE.CanvasTexture(c);
    tex.colorSpace = THREE.SRGBColorSpace;
    return tex;
}

function makeMilestoneFrame(kind, x, scale = 1) {
    const group = new THREE.Group();
    const frameMat = new THREE.MeshStandardMaterial({ color: 0xc6a978, metalness: 0.08, roughness: 0.48 });

    const paper = new THREE.Mesh(
        new THREE.PlaneGeometry(0.58, 0.78),
        new THREE.MeshStandardMaterial({ map: makeMilestoneTexture(kind), roughness: 0.85 })
    );
    paper.position.z = 0.024;
    group.add(paper);
    group.position.set(x, 1.94, -3.02);
    group.scale.set(scale, scale, 1);
    ROOM.add(group);
    return group;
}

/* ============================ RAYCASTING ============================ */
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
let hovered = null;
const hoveredOriginalEmissive = new Map();

function setHover(obj) {
    if (hovered === obj) return;
    if (hovered) {
        hovered.traverse(o => {
            if (o.isMesh && o.material && hoveredOriginalEmissive.has(o)) {
                o.material.emissiveIntensity = hoveredOriginalEmissive.get(o);
            }
        });
        hoveredOriginalEmissive.clear();
        const s = hovered.userData.scaleBase || 1;
        hovered.scale.set(s, s, s);
    }
    hovered = obj;
    canvas.classList.toggle('pointer', !!obj);
    if (obj) {
        obj.userData.scaleBase = obj.scale.x;
        obj.traverse(o => {
            if (o.isMesh && o.material && o.material.emissiveIntensity !== undefined) {
                hoveredOriginalEmissive.set(o, o.material.emissiveIntensity);
                o.material.emissiveIntensity = Math.min(2, (o.material.emissiveIntensity || 0) + 0.6);
            }
        });
    }
}

function intersect(e) {
    const rect = canvas.getBoundingClientRect();
    pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(pointer, camera);
    const meshes = [];
    interactables.forEach(it => it.traverse(o => { if (o.isMesh) meshes.push(o); }));
    const hits = raycaster.intersectObjects(meshes, false);
    return hits.length ? hits[0].object.userData.root : null;
}

let dragMoved = false;
let downXY = null;
canvas.addEventListener('pointerdown', e => { downXY = [e.clientX, e.clientY]; dragMoved = false; });
canvas.addEventListener('pointermove', e => {
    if (downXY) {
        if (Math.hypot(e.clientX - downXY[0], e.clientY - downXY[1]) > 6) dragMoved = true;
    }
    setHover(intersect(e));
});
canvas.addEventListener('pointerup', e => {
    const wasDrag = dragMoved;
    downXY = null; dragMoved = false;
    if (wasDrag) return;
    const obj = intersect(e);
    if (obj) openPanel(obj.userData.config);
});
canvas.addEventListener('pointerleave', () => setHover(null));

/* ============================ ANIMATION LOOP ============================ */
let introT = 0;
const introDuration = 1.8;
let introDone = false;
const clock = new THREE.Clock();
let cursorPhase = 0;

function animate() {
    requestAnimationFrame(animate);
    const dt = clock.getDelta();
    const t = clock.elapsedTime;

    if (!introDone) {
        introT += dt;
        const k = Math.min(1, introT / introDuration);
        const e = 1 - Math.pow(1 - k, 3);
        camera.position.lerpVectors(CAM_START, CAM_REST, e);
        controls.enabled = k >= 1;
        if (k >= 1) { introDone = true; controls.enabled = true; }
    }

    cursorPhase += dt;
    if (cursorPhase > 0.53) {
        cursorPhase = 0;
        const ctx = aboutEditor.ctx;
        ctx.fillStyle = (Math.floor(t * 1.9) % 2 === 0) ? '#fff' : '#1e1e1e';
        ctx.fillRect(320, 88 + 22 * 21.6 - 11, 8, 16);
        aboutTex.needsUpdate = true;
    }

    const dpos = dust.geometry.attributes.position;
    for (let i = 0; i < dustCount; i++) {
        dpos.array[i * 3 + 1] += dt * 0.04 * (0.5 + (i % 5) * 0.1);
        dpos.array[i * 3] += Math.sin(t * 0.3 + i) * dt * 0.01;
        if (dpos.array[i * 3 + 1] > 3) dpos.array[i * 3 + 1] = 0;
    }
    dpos.needsUpdate = true;

    if (hovered && hovered.userData.scaleBase !== undefined) {
        const s = hovered.userData.scaleBase * (1 + Math.sin(t * 6) * 0.005 + 0.02);
        hovered.scale.set(s, s, s);
    }

    trophyGroup.rotation.y = 0.3 + Math.sin(t * 0.5) * 0.05;

    controls.update();

    updateHotspots();

    renderer.render(scene, camera);
}

const _hp = new THREE.Vector3();
function updateHotspots() {
    hotspotMarkers.forEach(h => {
        h.obj.updateWorldMatrix(true, false);
        _hp.copy(h.offset).applyMatrix4(h.obj.matrixWorld).project(camera);
        const inFront = _hp.z < 1;
        const onScreen = _hp.x > -1.05 && _hp.x < 1.05 && _hp.y > -1.05 && _hp.y < 1.05;
        if (inFront && onScreen && introDone && !overlay.classList.contains('open')) {
            const x = (_hp.x * 0.5 + 0.5) * window.innerWidth;
            const y = (-_hp.y * 0.5 + 0.5) * window.innerHeight;
            h.el.style.transform = `translate3d(${x}px, ${y}px, 0)`;
            h.el.style.opacity = '';
        } else {
            h.el.style.transform = 'translate3d(-9999px,-9999px,0)';
        }
    });
}

    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
